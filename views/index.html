
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <title>Todo List</title>
</head>
<body>
  <div class="container py-5">

    <h1 class="heading mb-5">Note-Vote</h1>

      <section class="card nv-card shadow mx-auto">
        <div class="accordion" id="authAcc">

          <div class="accordion-item">
            <h2 class="accordion-header">
              <button class="accordion-button" type="button"
                data-bs-toggle="collapse" data-bs-target="#loginPanel">
                Log in
              </button>
            </h2>

            <div id="loginPanel" class="accordion-collapse collapse show" data-bs-parent="#authAcc">
              <div class="accordion-body">
                <h2 class="sub-heading text-center">Log in</h2>

                <form action="/app" method="post" class="px-2">
                  <div class="mb-3 text-start">
                    <label for="login-email" class="form-label">Username</label>
                    <input id="login-email" name="username" class="form-control" type="email" placeholder="Email address or Username" />
                  </div>

                  <div class="mb-3 text-start">
                    <label for="login-pass" class="form-label">Password</label>
                    <input id="login-pass" name="password" class="form-control" type="password" placeholder="Password" />
                  </div>

                  <div class="d-grid col-6 mx-auto">
                    <button type="submit" class="btn btn-primary">Log In</button>
                  </div>
                </form>
              </div>
            </div>
          </div>

          <div class="accordion-item">
            <h2 class="accordion-header">
              <button class="accordion-button collapsed" type="button"
                data-bs-toggle="collapse" data-bs-target="#registerPanel">
                Register
              </button>
            </h2>

            <div id="registerPanel" class="accordion-collapse collapse" data-bs-parent="#authAcc">
              <div class="accordion-body">
                <h2 class="sub-heading text-center">Sign up</h2>

                <form class="signup-form px-2" action="#" method="post">
                  <div class="mb-3 text-start">
                    <label for="signup-email" class="form-label">Email address</label>
                    <input id="signup-email" class="form-control" type="email" placeholder="Email address" />
                  </div>

                  <div class="mb-3 text-start">
                    <label for="signup-pass" class="form-label">Password</label>
                    <input id="signup-pass" class="form-control" type="password" placeholder="Password" />
                  </div>

                  <div class="mb-3 text-start">
                    <label for="invite" class="form-label">Invite Code</label>
                    <input id="invite" class="form-control" type="text" placeholder="Invite Code" />
                  </div>

                  <div class="d-grid col-6 mx-auto">
                    <button class="btn btn-primary" type="button">Sign Up</button>
                  </div>
                </form>
              </div>
            </div>
          </div>

        </div>
      </section>
  </div>
 <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
 <script src="js/script.js"></script>


</body>
</html>
